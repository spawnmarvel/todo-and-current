# Version: 1.0.5
# Ubuntu Loki Config: Native HTTPS API with Unencrypted Internal gRPC Ring
# Short Description: Configures a secure native HTTPS Loki instance with local TSDB storage, write-ahead logs, and automated log retention policy management.

# Disable multi-tenancy authentication; runs Loki in single-tenant mode where no X-Scope-OrgID header is required
auth_enabled: false

# Core network listener configurations
server:
  # The native HTTPS REST API port used by LogCLI and Grafana Alloy for query/push pipelines
  http_listen_port: 3100
  # The internal unencrypted high-performance gRPC port used for inter-module communications
  grpc_listen_port: 9096
  # Secures the http_listen_port using your custom SAN self-signed certificates
  http_tls_config:
    cert_file: /etc/loki/certs/loki.crt  # Path to your Base64 encoded x509 public certificate containing SAN extensions
    key_file: /etc/loki/certs/loki.key    # Path to your private key file (requires strict 640 loki:nogroup permissions)

# Shared common structural defaults for simplified single-node deployment mapping
common:
  # Binds the internal coordination communications strictly to the local loopback adapter
  instance_addr: 127.0.0.1
  # Base directory prefix used by helper modules if explicit directories are omitted
  path_prefix: /var/lib/loki
  # Shared data layer configuration blocks
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks  # Location on disk where passive compressed log data blocks are committed
      rules_directory: /var/lib/loki/rules    # Directory block for processing alerting and recording evaluation rule files
  # Number of nodes that must hold a copy of a log stream chunk (1 = no clustering duplication required)
  replication_factor: 1
  # The coordinate tracking ring configuration
  ring:
    kvstore:
      store: inmemory  # Keeps the distributed key-value ring mapping entirely within RAM for efficient local operations

# Memory buffer and ingestion lifecycle management configuration
ingester:
  # Keeps a log data block open in memory for up to 30 minutes waiting for additional log lines to arrive
  chunk_idle_period: 30m
  # Forces a log chunk to freeze, close, and prepare for disk write after 1 hour regardless of activity
  max_chunk_age: 1h
  # The target size threshold (approx 1.5MB compressed) that triggers a chunk to cut and commit to storage
  chunk_target_size: 1572864
  # Write-Ahead Log configuration to guarantee zero log line data loss during an abrupt power down or process crash
  wal:
    enabled: true
    dir: /var/lib/loki/wal                        # Directory where the active uncompressed log data stream is appended instantly
    replay_memory_ceiling: 2GB                    # Maximum memory buffer allocation utilized to rebuild state files during a cold boot replay

# Database schema index and storage engine formatting definition
schema_config:
  configs:
    - from: 2024-01-01                            # Activation timestamp execution threshold for this configuration schema track
      store: tsdb                                 # Utilizes the modern, high-performance Time Series Database index engine
      object_store: filesystem                    # Targets the local physical storage array instead of a cloud bucket container
      schema: v13                                 # The active index structural layout version standard
      index:
        prefix: index_                            # Filename prefix signature added to all generated index databases
        period: 24h                               # Shards index databases into clean 24-hour file buckets to streamline file searches

# Performance guardrails and security threshold ceilings
limits_config:
  retention_period: 480h                          # Your maximum ceiling buffer (480h = 20 days,  20 * 24 = 480h) that logs are legally allowed to live on disk
  ingestion_rate_mb: 5                            # Hard ceiling capping standard stream transfers at 5MB per second per connection
  ingestion_burst_size_mb: 10                     # Allows short temporary network spikes up to 10MB per second before dropping lines
  max_entries_limit_per_query: 5000               # Maximizes the terminal buffer extraction size (overrides the 30-line default limit)

# Storage optimization and automated log maintenance engine
compactor:
  working_directory: /var/lib/loki/compactor       # Temporary workspace directory used to merge small index files together
  compaction_interval: 10m                        # Executes an optimization pass every 10 minutes to minimize storage overhead
  retention_enabled: true                         # Activates the automated backend log purging routine based on limits_config values
  retention_delete_delay: 2h                      # Delay window applied to marked data before hard disk deletion occurs to allow indexes to sync
  retention_delete_worker_count: 150              # Number of parallel processing workers allocated to sweep and purge expired disk blocks
  delete_request_store: filesystem                # Keeps a persistent audit trail file tracking all executed chunk deletion actions