# Authentication: Disabled
# Why it's good: Simplifies the lab setup. You don't have to manage complex headers 
# or multi-tenant IDs. It makes communication between Alloy, Loki, and Grafana "plug-and-play."
auth_enabled: false

# Server: Port Management
# Why it's good: Uses standard ports (3100), making it compatible with all 
# default Grafana and Alloy documentation.
server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# Common: Single-Binary Optimization
# Why it's good: This block centralizes storage settings. Using "inmemory" for the ring 
# is perfect for standalone—it uses almost zero RAM and removes the need to 
# install an extra database like Etcd or Consul.
common:
  instance_addr: 127.0.0.1
  path_prefix: C:/Loki/data
  storage:
    filesystem:
      chunks_directory: C:/Loki/data/chunks
      rules_directory: C:/Loki/data/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Ingester: RAM & Disk Safety
# Why it's good: These settings ensure logs don't sit in your RAM forever.
# It forces Loki to write data to your C: drive regularly, keeping memory usage low.
ingester:
  chunk_idle_period: 30m
  max_chunk_age: 1h
  chunk_target_size: 1572864
  wal:
    enabled: true
    dir: C:/Loki/data/wal
    replay_memory_ceiling: 2GB  # Limits RAM used during a crash recovery

# Schema Config: Modern Indexing
# Why it's good: TSDB and v13 are the fastest, most modern ways to store Loki data.
# Daily index periods (24h) make it very easy for the Compactor to delete old logs
# without heavy CPU processing.
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Limits Config: Disk Space Insurance
# Why it's good: Prevents "Disk Full" errors. 30 days is the "sweet spot" 
# for labs—enough history to troubleshoot, but small enough for a VM.
limits_config:
  retention_period: 720h
  # Prevents a single app from flooding Loki
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Limits how many logs one search can return (prevents browser crashes)
  max_entries_limit_per_query: 5000

# Compactor: The Automated Janitor
# Why it's good: Automates maintenance. By setting "retention_enabled: true",
# you never have to manually delete files. It keeps your C:/Loki/data folder 
# at a consistent, predictable size.
compactor:
  working_directory: C:/Loki/data/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem